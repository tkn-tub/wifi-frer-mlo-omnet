[General]
network = BaseNetwork
description = Default configuration for a small MLO-FRER example
sim-time-limit = 15s
record-eventlog = false
repeat = 1
**.vector-recording = false

seed-0-mt = ${repetition} + 123752

**.printPkDetail = false
**.hasStatus = true # nodes should have status information to be able to simulate failure

# PCAP recording fails without these lines
**.crcMode = "computed"
**.fcsMode = "computed"

## Visualizers - only relevant to Qtenv
**.numMediumVisualizers = 4
**.displaySignals = true
*.visualizer.mediumVisualizer[0].nodeFilter = "sta1"
*.visualizer.mediumVisualizer[0].signalColor = "red"
*.visualizer.mediumVisualizer[1].nodeFilter = "sta2"
*.visualizer.mediumVisualizer[1].signalColor = "blue"
*.visualizer.mediumVisualizer[2].nodeFilter = "ap"
*.visualizer.mediumVisualizer[2].interfaceFilter = "wlan[0]"
*.visualizer.mediumVisualizer[2].signalColor = "yellow"
*.visualizer.numDataLinkVisualizers = 2
*.visualizer.dataLinkVisualizer[*].displayLinks = true
*.visualizer.dataLinkVisualizer[*].activityLevel = "peer"
*.visualizer.dataLinkVisualizer[0].nodeFilter = "sta1 or ap"
*.visualizer.dataLinkVisualizer[0].lineColor = "red"
*.visualizer.dataLinkVisualizer[0].labelColor = "red"
*.visualizer.dataLinkVisualizer[1].nodeFilter = "ap or sta2"
*.visualizer.dataLinkVisualizer[1].lineColor = "darkblue"
*.visualizer.dataLinkVisualizer[1].labelColor = "darkblue"
*.visualizer.ieee80211Visualizer[0].displayAssociations = true

## Default configuration for two STAs and one AP, all MLO enabled

## AP
*.ap.lmac[0].mgmt.ssid = "wlan2.4"
*.ap.lmac[1].mgmt.ssid = "wlan5"

## STAs
*.*sta*.lmac[0].agent.defaultSsid = "wlan2.4"
*.*sta*.lmac[1].agent.defaultSsid = "wlan5"

*.radioMedium.pathLoss.typename = "LogNormalShadowing" # module type
*.radioMedium.pathLoss.sigma = 2 # override default value of 1

## following settings apply both STAs and APs
**.arp.typename = "GlobalArp"
*.**.numWlanInterfaces = 2
*.**.lmac[*].protocol = "ieee80211be"
*.**.lmac[*].radio.antenna.numAntennas = 2
*.**.lmac[0].radio.bandwidth = 20MHz
*.**.lmac[1].radio.bandwidth = 20MHz
*.**.lmac[*].radio.receiver.modulation = "QAM-64"
*.**.lmac[*].**.pendingQueue.packetCapacity = 100000
*.**.lmac[0].radio.bandName = "2.4 GHz"
*.**.lmac[1].radio.bandName = "5 GHz (20 MHz)"
*.**.lmac[0].bitrate = ${bitrate=52}Mbps # Ieee80211ModeSet/findMode()
*.**.lmac[1].bitrate = 130Mbps
#**.analogModel.ignorePartialInterference = true
*.**.umac.defaultInterface = "lmac0"

*.**.lmac[*].mac.hcf.isBlockAckSupported = true
**.hcf.originatorMacDataService.fragmentationPolicy.fragmentationThreshold = 10000B
**.hcf.originatorMacDataService.msduAggregationPolicy.aggregationLengthThreshold = 10000

*.**.mobility.initialX = uniform(270m, 330m)
*.**.mobility.initialY = uniform(270m, 330m)
*.**.mobility.initialZ = 0m

# disable retransmissions for FRER-enabled node
*.**.**.edcaf[*].recoveryProcedure.shortRetryLimit = 3
*.**.**.edcaf[*].recoveryProcedure.longRetryLimit = 3

#*.scenarioManager.script = xmldoc("failure.xml")

*.radioMedium.backgroundNoise.power = -110dBm

[Config SLO]
extends = General
description = Initiates UDP traffic over a single (default 2.4 GHz) interface

# UDP traffic configuration
*.sta1.numApps = 1
*.sta1.app[0].typename = "UdpBasicApp"
*.sta1.app[0].destAddresses = "sta2"
*.sta1.app[0].localPort = 5000
*.sta1.app[0].destPort = 5000
*.sta1.app[0].packetName = "UDPData:0" # IMPORTANT: this name is used to extract statistics, :<number> represents the application index
*.sta1.app[0].messageLength = ${packetLength=1000}B
*.sta1.app[0].sendInterval = exponential(1028 * 8 / ${bitrate} * 3.5us) # assuming the bitrate is given in Mbps
*.sta1.app[0].startTime = 1s
*.sta1.app[0].stopTime = 11s

*.sta2.numApps = 1
*.sta2.app[0].typename = "UdpSink"
*.sta2.app[0].localPort = 5000

[Config LinkAggregation]
extends = SLO
description = Eneables link aggregation over MLO
*.**.umac.typename = "RandomUMac"

[Config FRER]
extends = SLO
description = Enables FRER over MLO

## QoS configuration 
*.**.classifier.ipProtocolUpMap = ""
*.**.classifier.udpPortUpMap = "5000 BE" # use NC (network control (7)) for udp port 5000
*.**.classifier.tcpPortUpMap = ""

## FRER configuration
*.**.ieee8021r.protocol.rTagHeaderInserter.nextProtocol = "ieee80211be"
*.**.umac.forwardingTable = {streamA1: "lmac0", streamA2: "lmac1"}

*.**.ieee8021r.policy.streamIdentifier.identifier.mapping = [{stream: "streamA", packetFilter: expr(udp.destPort == 5000), sequenceNumbering: true}]
*.**.ieee8021r.policy.streamRelay.splitter.mapping = {streamA: ["streamA1", "streamA2"]}

#*.**.ieee8021r.policy.streamCoder.decoder.mapping = [{stream: "streamA", destination: "sta2"}]
*.**.ieee8021r.policy.streamCoder.decoder.mapping = [{stream: "streamA1", interface: "lmac0", destination: "sta2"}, {stream: "streamA2", interface: "lmac1", destination: "sta2"}]
*.**.ieee8021r.policy.streamRelay.merger.mapping = {streamA1: "streamA", streamA2: "streamA"}
*.**.ieee8021r.policy.streamRelay.merger.bufferSize = 10000

*.sta2.ieee8021r.policy.streamRelay.merger.mapping = {streamA1: "", streamA2: ""} # Destination "terminates" StreamInd

# These two lines simply disable FRER on an FRER-enabled STA
#*.sta1.umac.defaultInterface = ${"lmac0"} # this switches SLO between 2.4 and 5 GHz
#*.sta1.ieee8021r.policy.streamIdentifier.*.mapping = []

#############################################################

[Config Congestion]
extends = FRER
network = MixedNetwork

*.sta*.mobility.initFromDisplayString = false
*.slo*.mobility.initFromDisplayString = false

*.**.mobility.initialX = uniform(270m, 330m)
*.**.mobility.initialY = uniform(220m, 280m)
*.**.mobility.initialZ = 0m

MixedNetwork.networkSize = ${networkSize=8, 12, 16, 20, 24}

# UDP traffic configuration

*.sta1.app[0].startTime = uniform(1s, 2s)
*.sta1.app[0].sendInterval = exponential(1028 * 8 / ${bitrate} * 3.5us * 16)  # assuming the bitrate is given in Mbps

*.slo_sender_sta[*].app[0].messageLength = ${packetLength}B
*.slo_sender_sta[*].app[0].startTime = uniform(1s, 2s)
*.slo_sender_sta[*].app[0].stopTime = 11s
*.slo_sender_sta[*].app[0].sendInterval = exponential(1028 * 8 / ${bitrate} * 3.5us * 16) # assuming the bitrate is given in Mbps

*.slo_receiver_sta[*].numApps = 1
*.slo_receiver_sta[*].app[0].typename = "UdpSink"
*.slo_receiver_sta[*].app[0].localPort = 5001

[Config Mobility]
extends = FRER
network = MixedNetwork

MixedNetwork.networkSize = 16

*.sta*.mobility.typename = "RandomWaypointMobility"
*.slo*.mobility.typename = "RandomWaypointMobility"

*.sta*.mobility.initFromDisplayString = false
*.slo*.mobility.initFromDisplayString = false

*.**.mobility.initialX = uniform(150m, 450m)
*.**.mobility.initialY = uniform(100m, 400m)
*.**.mobility.initialZ = 0m

*.**.mobility.constraintAreaMinX = 0m
*.**.mobility.constraintAreaMinY = 0m
*.**.mobility.constraintAreaMinZ = 0m
*.**.mobility.constraintAreaMaxX = 450m
*.**.mobility.constraintAreaMaxY = 450m
*.**.mobility.constraintAreaMaxZ = 0m

#*.**.speed = ${speed=1.0, 3.0, 5.0, 7.0, 9.0}mps
*.**.speed = ${speed=7.0, 9.0}mps

*.sta1.app[0].startTime = uniform(1s, 2s)
*.sta1.app[0].sendInterval = exponential(1028 * 8 / ${bitrate} * 3.5us * 12)  # assuming the bitrate is given in Mbps
*.slo_sender_sta[*].app[0].messageLength = ${packetLength}B
*.slo_sender_sta[*].app[0].startTime = uniform(1s, 2s)
*.slo_sender_sta[*].app[0].stopTime = 11s
*.slo_sender_sta[*].app[0].sendInterval = exponential(1028 * 8 / ${bitrate} * 3.5us * 12) # assuming the bitrate is given in Mbps

*.slo_receiver_sta[*].numApps = 1
*.slo_receiver_sta[*].app[0].typename = "UdpSink"
*.slo_receiver_sta[*].app[0].localPort = 5001

